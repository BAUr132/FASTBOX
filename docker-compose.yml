version: '3.8'

services:
  # MySQL Service
  mysql:
    image: 'mysql:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: '${DB_DATABASE:-fastbox}'
      MYSQL_USER: '${DB_USERNAME:-sail}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - 'fastbox-mysql:/var/lib/mysql'
    networks:
      - fastbox

  # Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fastbox-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - fastbox
    depends_on:
      - mysql

  # Nginx to serve Laravel
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fastbox
    depends_on:
      - backend

  # Vue Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: fastbox-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - fastbox

networks:
  fastbox:
    driver: bridge

volumes:
  fastbox-mysql:
    driver: local
